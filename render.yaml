services:
  - type: web
    name: medical-app-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medical-app-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: medical-app-db
    databaseName: medical_db
    plan: free
